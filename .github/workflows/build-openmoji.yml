name: openmoji

on:
  schedule:
    - cron: "40 5 * * 1"        # Mondays — rebuilds only if openmoji's upstream changed
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if upstream is unchanged"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      action: openmoji
      force: ${{ github.event.inputs.force == 'true' }}
    secrets: inherit
