name: build (weekly, changed only)

on:
  schedule:
    - cron: "0 5 * * 1"        # Mondays 05:00 UTC — sync from upstream
  workflow_dispatch:
    inputs:
      sets:
        description: "Specific sets to build (space-separated); blank = changed only"
        default: ""
      force:
        description: "Build all sets (ignore change detection)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Detect changed sets
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.sets }}" ]; then
            sets="${{ github.event.inputs.sets }}"
          elif [ "${{ github.event.inputs.force }}" = "true" ]; then
            sets=$(python -c "import json;print(' '.join(json.load(open('sources.json'))))")
          else
            sets=$(python build.py changed | tr '\n' ' ')
          fi
          echo "sets=$(echo $sets | xargs)" >> "$GITHUB_OUTPUT"
          echo "Building: ${sets:-<none>}"

      - name: Build only changed sets
        if: steps.detect.outputs.sets != ''
        run: python build.py build ${{ steps.detect.outputs.sets }}

      - name: Publish to the rolling 'latest' release
        if: steps.detect.outputs.sets != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --prerelease --title "Latest builds" \
              --notes "Rolling latest fonts, refreshed weekly when upstream changes."
          gh release upload latest dist/*.ttf --clobber

      - name: Record upstream refs
        if: steps.detect.outputs.sets != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "sync: rebuilt ${{ steps.detect.outputs.sets }}" && git push || echo "nothing to commit"
