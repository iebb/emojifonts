name: docs (VERSIONS.md)

# Single writer of VERSIONS.md — regenerated from the per-set versions/*.json
# (each carries its emoji version, computed at build time). Per-set builds
# trigger this after they commit; concurrency serializes so there's no conflict.
on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1"   # Mondays, after the staggered per-set builds

permissions:
  contents: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python build.py render-versions
      - name: Commit VERSIONS.md if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSIONS.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: refresh VERSIONS.md"
            for i in 1 2 3 4 5; do git pull --rebase --autostash && git push && break || sleep 3; done
          fi
